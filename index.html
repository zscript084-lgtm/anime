<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox UGC Sniper</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #232527;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #393b3d;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 400px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #e2e2e2; }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #555;
            box-sizing: border-box;
        }
        input {
            background-color: #232527;
            color: white;
        }
        button {
            background-color: #00b06f;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { background-color: #00965e; }
        button.stop {
            background-color: #c62828;
        }
        button.stop:hover {
            background-color: #a01f1f;
        }
        #status {
            margin-top: 15px;
            font-size: 0.9em;
            color: #aaa;
        }
        .log {
            margin-top: 20px;
            background: #232527;
            padding: 10px;
            border-radius: 4px;
            height: 150px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            font-size: 0.8em;
            color: #00e676;
        }
        .error { color: #ff5252; }
    </style>
</head>
<body>

<div class="container">
    <h2>Roblox UGC Sniper</h2>
    <input type="text" id="cookie" placeholder="Enter .ROBLOSEcurity Cookie">
    <input type="text" id="itemId" placeholder="Enter UGC Item ID">
    <input type="number" id="price" placeholder="Max Price (Optional)">
    
    <button id="actionBtn" onclick="toggleSniper">Start Sniper</button>
    
    <div id="status">Status: Idle</div>
    <div class="log" id="logBox">System ready...\n</div>
</div>

<script>
    let isRunning = false;
    let intervalId = null;

    // NOTE: Browsers block direct API calls to Roblox from other sites (CORS).
    // We must use a proxy. If this proxy stops working, you must find a new one.
    const PROXY_URL = "https://corsproxy.io/?"; 

    function log(message, isError = false) {
        const logBox = document.getElementById('logBox');
        const timestamp = new Date().toLocaleTimeString();
        const colorClass = isError ? 'error' : '';
        logBox.innerHTML += `<span class="${colorClass}">[${timestamp}] ${message}</span>\n`;
        logBox.scrollTop = logBoxBox.scrollHeight;
    }

    async function checkItem() {
        const cookie = document.getElementById('cookie').value;
        const itemId = document.getElementById('itemId').value;
        const maxPriceInput = document.getElementById('price').value;
        const maxPrice = maxPriceInput ? parseInt(maxPriceInput) : null;

        if (!cookie || !itemId) {
            log("Missing cookie or Item ID!", true);
            stopSniper();
            return;
        }

        try {
            // We check the sales API to see if the item is on sale
            const url = `https://economy.roblox.com/v2/assets/${itemId}/details`;
            const proxyUrl = PROXY_URL + encodeURIComponent(url);

            const response = await fetch(proxyUrl, {
                method: 'GET',
                headers: {
                    'Cookie': `.ROBLOSEcurity=${cookie}`,
                    'Content-Type': 'application/json'
                },
                mode: 'cors' // Attempting standard CORS request via proxy
            });

            if (!response.ok) {
                // Item might be off-sale or not found
                if(response.status === 404) {
                    log(`Item ${itemId} not found or off-sale.`);
                } else {
                    log(`Error ${response.status}: ${response.statusText}`, true);
                }
                return;
            }

            const data = await response.json();

            if (data.IsOnSale && data.Price) {
                if (maxPrice && data.Price > maxPrice) {
                    log(`Item on sale for ${data.Price} (Too expensive, waiting for ${maxPrice})`);
                    return;
                }
                
                log(`>>> ITEM FOUND! Price: ${data.Price} <<<`);
                alert(`SUCCESS! Item ${itemId} is on sale for ${data.Price}. The bot has detected it.`);
                // We do not stop automatically so you can manually handle it or modify code to auto-buy (complex)
                
            } else {
                log(`Item ${itemId} is not currently on sale.`);
            }

        } catch (error) {
            log(`Network Error: ${error.message}. Proxy might be blocked.`, true);
            stopSniper();
        }
    }

    function toggleSniper() {
        if (isRunning) {
            stopSniper();
        } else {
            startSniper();
        }
    }

    function startSniper() {
        const cookie = document.getElementById('cookie').value;
        const itemId = document.getElementById('itemId').value;

        if (!cookie || !itemId) {
            alert("Please enter both a Cookie and an Item ID.");
            return;
        }

        isRunning = true;
        document.getElementById('actionBtn').textContent = "Stop Sniper";
        document.getElementById('actionBtn').classList.add('stop');
        document.getElementById('status').textContent = "Status: Running...";
        document.getElementById('status').style.color = "#00e676";
        
        log("Sniper started. Monitoring...");
        
        // Check immediately then every 2 seconds (Roblox has rate limits, don't go faster)
        checkItem();
        intervalId = setInterval(checkItem, 2000);
    }

    function stopSniper() {
        isRunning = false;
        document.getElementById('actionBtn').textContent = "Start Sniper";
        document.getElementById('actionBtn').classList.remove('stop');
        document.getElementById('status').textContent = "Status: Stopped";
        document.getElementById('status').style.color = "#aaa";
        
        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null;
        }
        log("Sniper stopped.");
    }
</script>

</body>
</html>
